<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title{font-family:Arial,sans-serif;font-size:34px;font-weight:700;fill:#111}
      .small{font-family:Arial,sans-serif;font-size:16px;fill:#111}
      .pin{font-family:Arial,sans-serif;font-size:17px;fill:#111;font-weight:700}
      .box{fill:#f7f7f7;stroke:#222;stroke-width:3;rx:16}
      .part{fill:#ffffff;stroke:#222;stroke-width:3;rx:12}
      .wire-red{stroke:#d71920;stroke-width:6;fill:none}
      .wire-black{stroke:#111;stroke-width:6;fill:none}
      .wire-green{stroke:#12a150;stroke-width:6;fill:none}
      .wire-blue{stroke:#2c6ee8;stroke-width:6;fill:none}
      .wire-orange{stroke:#f28c28;stroke-width:6;fill:none}
      .wire-purple{stroke:#7b3fc6;stroke-width:6;fill:none}
      .note{font-family:Arial,sans-serif;font-size:18px;fill:#333}
    </style>
  </defs>

  <text x="50" y="55" class="title">O-Watch Beta — Electronics Wiring Diagram</text>
  <text x="50" y="88" class="note">NeoPixel powered from 5V. Vibration motor powered from 3.3V.</text>

  <!-- ESP -->
  <rect x="90" y="160" width="360" height="560" class="box"/>
  <text x="145" y="200" class="title" font-size="28">ESP32-C3 SuperMini</text>

  <circle cx="430" cy="280" r="8" fill="#222"/>
  <text x="250" y="286" class="pin">GPIO5 — NeoPixel DATA</text>

  <circle cx="430" cy="360" r="8" fill="#222"/>
  <text x="255" y="366" class="pin">GPIO7 — Button</text>

  <circle cx="430" cy="440" r="8" fill="#222"/>
  <text x="255" y="446" class="pin">GPIO3 — Motor Control</text>

  <circle cx="430" cy="530" r="8" fill="#222"/>
  <text x="325" y="536" class="pin">5V</text>

  <circle cx="430" cy="570" r="8" fill="#222"/>
  <text x="315" y="576" class="pin">3.3V</text>

  <circle cx="430" cy="640" r="8" fill="#222"/>
  <text x="320" y="646" class="pin">GND</text>

  <!-- LED -->
  <rect x="820" y="160" width="300" height="190" class="part"/>
  <text x="875" y="205" class="title" font-size="28">NeoPixel 5050</text>

  <circle cx="820" cy="260" r="8" fill="#222"/>
  <text x="845" y="266" class="pin">DIN</text>

  <circle cx="970" cy="340" r="8" fill="#222"/>
  <text x="945" y="320" class="pin">5V</text>

  <circle cx="1120" cy="260" r="8" fill="#222"/>
  <text x="1050" y="266" class="pin">GND</text>

  <rect x="610" y="247" width="90" height="26" fill="#ffe7aa" stroke="#222" stroke-width="2"/>
  <text x="620" y="266" class="small">330Ω</text>

  <!-- Button -->
  <rect x="820" y="410" width="260" height="120" class="part"/>
  <text x="900" y="455" class="title" font-size="26">Button</text>

  <circle cx="820" cy="490" r="8" fill="#222"/>
  <circle cx="1080" cy="490" r="8" fill="#222"/>

  <text x="840" y="495" class="pin">GPIO7 side</text>
  <text x="935" y="520" class="pin">GND side</text>

  <!-- Transistor -->
  <rect x="820" y="590" width="280" height="200" class="part"/>
  <text x="850" y="635" class="title" font-size="28">2N2222 Transistor</text>

  <text x="850" y="690" class="pin">Emitter → GND</text>
  <text x="850" y="730" class="pin">Base ← GPIO3 via 1kΩ</text>
  <text x="850" y="770" class="pin">Collector → Motor -</text>

  <!-- Motor -->
  <rect x="1160" y="610" width="180" height="90" class="part"/>
  <text x="1190" y="650" class="title" font-size="24">Vibration</text>
  <text x="1210" y="680" class="small">Motor</text>

  <circle cx="1160" cy="635" r="8" fill="#222"/>
  <circle cx="1340" cy="635" r="8" fill="#222"/>

  <text x="1125" y="640" class="pin">-</text>
  <text x="1350" y="640" class="pin">+</text>

  <!-- 1k -->
  <rect x="610" y="427" width="90" height="26" fill="#ffe7aa" stroke="#222" stroke-width="2"/>
  <text x="620" y="446" class="small">1kΩ</text>

  <!-- Diode -->
  <text x="1160" y="760" class="pin">Flyback diode</text>
  <text x="1160" y="785" class="small">Stripe → motor +</text>

  <!-- Wires -->
  <path d="M430 280 C530 280,560 260,610 260" class="wire-green"/>
  <path d="M700 260 C740 260,770 260,820 260" class="wire-green"/>

  <!-- LED 5V -->
  <path d="M430 530 C620 530,780 340,970 340" class="wire-red"/>
  <text x="620" y="505" class="small" fill="#d71920">5V → NeoPixel VCC</text>

  <!-- LED GND -->
  <path d="M430 640 C640 640,930 560,1120 260" class="wire-black"/>

  <!-- Button -->
  <path d="M430 360 C570 360,660 490,820 490" class="wire-blue"/>
  <path d="M1080 490 C1180 490,1220 560,1220 820 L430 820 C410 820,410 630,430 640" class="wire-black"/>

  <!-- Motor GPIO -->
  <path d="M430 440 C530 440,560 440,610 440" class="wire-purple"/>
  <path d="M700 440 C760 440,780 730,820 730" class="wire-purple"/>

  <!-- Emitter -->
  <path d="M820 690 C720 690,560 640,430 640" class="wire-black"/>

  <!-- Collector -->
  <path d="M1100 770 C1130 770,1120 635,1160 635" class="wire-orange"/>

  <!-- Motor 3.3V -->
  <path d="M1340 635 C1360 635,1360 570,430 570" class="wire-red"/>
  <text x="1120" y="585" class="small" fill="#d71920">Motor + → 3.3V</text>

  <!-- Notes -->
  <rect x="70" y="760" width="720" height="100" fill="#fff7d6" stroke="#e0b400" stroke-width="2" rx="12"/>
  <text x="95" y="792" class="note">Important:</text>
  <text x="95" y="820" class="small">1) All grounds must be connected together.</text>
  <text x="95" y="845" class="small">2) NeoPixel DATA must go to DIN, not DOUT.</text>
  <text x="420" y="820" class="small">3) NeoPixel uses 5V power.</text>
  <text x="420" y="845" class="small">4) Motor uses 3.3V through 2N2222 transistor.</text>
</svg>
